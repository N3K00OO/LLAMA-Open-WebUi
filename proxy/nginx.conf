events {
    worker_connections 2048;
}

http {
    client_max_body_size 1024M;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    log_format runpod '$remote_addr - $host [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /workspace/logs/nginx-access.log runpod;
    error_log /workspace/logs/nginx-error.log warn;

    # Open WebUI : 8080
    server {
        listen 8081;
        server_name _;

        location ^~ /api/ {
            add_header Cache-Control no-cache;
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_cache off;
            proxy_intercept_errors on;
            error_page 500 = @openwebui_api_500;
            error_page 502 = @openwebui_api_502;
            error_page 503 = @openwebui_api_503;
            error_page 504 = @openwebui_api_504;
        }

        location ^~ /ws/ {
            add_header Cache-Control no-cache;
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_cache off;
            proxy_intercept_errors on;
            error_page 500 = @openwebui_api_500;
            error_page 502 = @openwebui_api_502;
            error_page 503 = @openwebui_api_503;
            error_page 504 = @openwebui_api_504;
        }

        location ^~ /socket.io/ {
            add_header Cache-Control no-cache;
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_cache off;
            proxy_intercept_errors on;
            error_page 500 = @openwebui_api_500;
            error_page 502 = @openwebui_api_502;
            error_page 503 = @openwebui_api_503;
            error_page 504 = @openwebui_api_504;
        }

        location / {
            add_header Cache-Control no-cache;
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_cache off;
        }

        location /README.md {
            root /usr/share/nginx/html;
        }

        location @openwebui_api_500 {
            default_type application/json;
            return 500 '{"error":{"message":"Open WebUI upstream failed","type":"upstream_error","code":500}}';
        }

        location @openwebui_api_502 {
            default_type application/json;
            return 502 '{"error":{"message":"Open WebUI upstream unavailable","type":"upstream_error","code":502}}';
        }

        location @openwebui_api_503 {
            default_type application/json;
            return 503 '{"error":{"message":"Open WebUI upstream unavailable","type":"upstream_error","code":503}}';
        }

        location @openwebui_api_504 {
            default_type application/json;
            return 504 '{"error":{"message":"Open WebUI upstream timed out","type":"upstream_error","code":504}}';
        }
    }

    # llama.cpp OpenAI-compatible API : 11434
    server {
        listen 11435;
        server_name _;

        location / {
            add_header Cache-Control no-cache;
            proxy_pass http://127.0.0.1:11434;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_cache off;
            proxy_intercept_errors on;
            error_page 500 = @llama_api_500;
            error_page 502 = @llama_api_502;
            error_page 503 = @llama_api_503;
            error_page 504 = @llama_api_504;
        }

        location /README.md {
            root /usr/share/nginx/html;
        }

        location @llama_api_500 {
            default_type application/json;
            return 500 '{"error":{"message":"llama.cpp upstream failed","type":"upstream_error","code":500}}';
        }

        location @llama_api_502 {
            default_type application/json;
            return 502 '{"error":{"message":"llama.cpp upstream unavailable","type":"upstream_error","code":502}}';
        }

        location @llama_api_503 {
            default_type application/json;
            return 503 '{"error":{"message":"llama.cpp upstream unavailable","type":"upstream_error","code":503}}';
        }

        location @llama_api_504 {
            default_type application/json;
            return 504 '{"error":{"message":"llama.cpp upstream timed out","type":"upstream_error","code":504}}';
        }
    }

    # JupyterLab : 8888
    server {
        listen 8889;
        server_name _;

        location / {
            add_header Cache-Control no-cache;
            proxy_pass http://127.0.0.1:8888;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_intercept_errors on;
            error_page 502 =200 @jupyter_502;
        }

        location /api/kernels/ {
            proxy_pass http://127.0.0.1:8888;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /README.md {
            root /usr/share/nginx/html;
        }

        location @jupyter_502 {
            add_header Cache-Control no-cache;
            root /usr/share/nginx/html;
            rewrite ^(.*)$ /readme.html break;
        }
    }
}
